<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Namaz Tracker</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0b0f14;
    color: #eef1f5;
    min-height: 100vh;
    padding: 18px;
  }
  .wrap { max-width: 460px; margin: 0 auto; }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 6px 0 2px;
    text-align: center;
  }
  p.sub {
    color: #8b93a1;
    font-size: 13px;
    margin: 0 0 18px;
    text-align: center;
  }
  .city-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .city-row input {
    flex: 1;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #2a313d;
    background: #131922;
    color: #eef1f5;
    font-size: 14px;
  }
  .city-row button {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: #2e7d5b;
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  .hijri {
    text-align: center;
    color: #8b93a1;
    font-size: 13px;
    margin-bottom: 16px;
  }
  .prayers {
    background: #131922;
    border: 1px solid #232b36;
    border-radius: 14px;
    padding: 8px 4px;
    margin-bottom: 20px;
  }
  .prayer-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid #1c232d;
  }
  .prayer-item:last-child { border-bottom: none; }
  .prayer-name { font-size: 15px; font-weight: 500; }
  .prayer-time { font-size: 15px; color: #4fd1a5; font-weight: 600; }
  .prayer-item.active { background: #17301f; border-radius: 8px; }

  .section-title {
    font-size: 14px;
    color: #8b93a1;
    margin: 4px 0 10px;
  }
  .habit-card {
    background: #131922;
    border: 1px solid #232b36;
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 16px;
  }
  .habit-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-bottom: 1px solid #1c232d;
  }
  .habit-item:last-child { border-bottom: none; }
  .habit-label { font-size: 15px; }
  .check {
    width: 26px;
    height: 26px;
    border-radius: 8px;
    border: 2px solid #3a4453;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 15px;
  }
  .check.done {
    background: #2e7d5b;
    border-color: #2e7d5b;
  }

  .streak-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .streak-card {
    flex: 1;
    background: #131922;
    border: 1px solid #232b36;
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .streak-num { font-size: 22px; font-weight: 600; color: #4fd1a5; }
  .streak-label { font-size: 12px; color: #8b93a1; margin-top: 2px; }

  .add-habit {
    display: flex;
    gap: 8px;
    margin-bottom: 30px;
  }
  .add-habit input {
    flex: 1;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #2a313d;
    background: #131922;
    color: #eef1f5;
    font-size: 14px;
  }
  .add-habit button {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: #2a313d;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  .status { text-align: center; color: #8b93a1; font-size: 13px; margin-bottom: 10px; }
  .notify-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #131922;
    border: 1px solid #232b36;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  .notify-row span { font-size: 14px; }
  .toggle {
    width: 46px;
    height: 26px;
    border-radius: 13px;
    background: #2a313d;
    border: none;
    position: relative;
    cursor: pointer;
  }
  .toggle.on { background: #2e7d5b; }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: white;
    transition: left 0.15s;
  }
  .toggle.on::after { left: 23px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Namaz aur Habit Tracker</h1>
  <p class="sub">Roz ki namaz aur nek amaal ka hisaab rakhein</p>

  <div class="city-row">
    <input type="text" id="cityInput" placeholder="Apna shehar likhein (jaise Karachi)" />
    <button id="cityBtn">Set</button>
  </div>
  <div class="hijri" id="hijriDate"></div>
  <div class="status" id="statusMsg"></div>

  <div class="notify-row">
    <span>Namaz reminders (notification)</span>
    <button class="toggle" id="notifyToggle"></button>
  </div>

  <div class="section-title">Aaj ke Namaz Timings</div>
  <div class="prayers" id="prayersBox"></div>

  <div class="streak-row">
    <div class="streak-card">
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-label">din ka streak</div>
    </div>
    <div class="streak-card">
      <div class="streak-num" id="todayNum">0/5</div>
      <div class="streak-label">aaj ki namaz</div>
    </div>
  </div>

  <div class="section-title">Aaj ke Habits</div>
  <div class="habit-card" id="habitBox"></div>

  <div class="add-habit">
    <input type="text" id="newHabit" placeholder="Naya habit add karein (jaise Quran)" />
    <button id="addHabitBtn">Add</button>
  </div>
</div>

<script>
  const PRAYER_KEYS = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
  const today = new Date().toISOString().slice(0, 10);
  const STORAGE_KEY = 'namaz_tracker_state_v1';

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {
      console.error('Load error', e);
    }
    return {
      city: "Karachi",
      country: "Pakistan",
      days: {},
      habits: ["Quran tilawat", "Tasbeeh"],
      notifyOn: false,
      notifiedToday: {}
    };
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      console.error('Save error', e);
    }
  }

  let state = loadState();
  if (!state.notifiedToday || state.notifiedToday.date !== today) {
    state.notifiedToday = { date: today, sent: [] };
  }

  function ensureToday() {
    if (!state.days[today]) {
      state.days[today] = { prayers: {}, habits: {} };
    }
  }

  function calcStreak() {
    let streak = 0;
    let d = new Date();
    while (true) {
      const key = d.toISOString().slice(0, 10);
      const day = state.days[key];
      const allDone = day && PRAYER_KEYS.every(p => day.prayers[p]);
      if (allDone) {
        streak++;
        d.setDate(d.getDate() - 1);
      } else {
        break;
      }
    }
    return streak;
  }

  function renderPrayers(timings) {
    ensureToday();
    const box = document.getElementById('prayersBox');
    box.innerHTML = '';
    PRAYER_KEYS.forEach(name => {
      const done = state.days[today].prayers[name];
      const row = document.createElement('div');
      row.className = 'prayer-item' + (done ? ' active' : '');
      row.innerHTML = `
        <span class="prayer-name">${name}</span>
        <span style="display:flex; align-items:center; gap:10px;">
          <span class="prayer-time">${timings ? timings[name] : '--:--'}</span>
          <button class="check ${done ? 'done' : ''}" data-name="${name}">${done ? '&#10003;' : ''}</button>
        </span>`;
      box.appendChild(row);
    });
    box.querySelectorAll('.check').forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.getAttribute('data-name');
        ensureToday();
        state.days[today].prayers[name] = !state.days[today].prayers[name];
        saveState();
        renderPrayers(timings);
        renderStats();
      });
    });
  }

  function renderHabits() {
    ensureToday();
    const box = document.getElementById('habitBox');
    box.innerHTML = '';
    state.habits.forEach(habit => {
      const done = state.days[today].habits[habit];
      const row = document.createElement('div');
      row.className = 'habit-item';
      row.innerHTML = `
        <span class="habit-label">${habit}</span>
        <button class="check ${done ? 'done' : ''}" data-habit="${habit}">${done ? '&#10003;' : ''}</button>`;
      box.appendChild(row);
    });
    box.querySelectorAll('.check').forEach(btn => {
      btn.addEventListener('click', () => {
        const habit = btn.getAttribute('data-habit');
        ensureToday();
        state.days[today].habits[habit] = !state.days[today].habits[habit];
        saveState();
        renderHabits();
      });
    });
  }

  function renderStats() {
    ensureToday();
    const doneCount = PRAYER_KEYS.filter(p => state.days[today].prayers[p]).length;
    document.getElementById('todayNum').textContent = `${doneCount}/5`;
    document.getElementById('streakNum').textContent = calcStreak();
  }

  async function fetchPrayerTimes() {
    const statusEl = document.getElementById('statusMsg');
    statusEl.textContent = 'Namaz timings load ho rahi hain...';
    try {
      const url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(state.city)}&country=${encodeURIComponent(state.country)}&method=1`;
      const res = await fetch(url);
      const json = await res.json();
      if (json.code === 200) {
        const t = json.data.timings;
        currentTimings = t;
        const hijri = json.data.date.hijri;
        document.getElementById('hijriDate').textContent =
          `${hijri.day} ${hijri.month.en} ${hijri.year} AH — ${state.city}`;
        renderPrayers(t);
        statusEl.textContent = '';
      } else {
        statusEl.textContent = 'Shehar nahi mila, dobara try karein.';
        renderPrayers(null);
      }
    } catch (err) {
      statusEl.textContent = 'Internet connection check karein.';
      renderPrayers(null);
    }
  }

  document.getElementById('cityBtn').addEventListener('click', () => {
    const val = document.getElementById('cityInput').value.trim();
    if (val) {
      state.city = val;
      saveState();
      fetchPrayerTimes();
    }
  });

  document.getElementById('addHabitBtn').addEventListener('click', () => {
    const val = document.getElementById('newHabit').value.trim();
    if (val && !state.habits.includes(val)) {
      state.habits.push(val);
      document.getElementById('newHabit').value = '';
      saveState();
      renderHabits();
    }
  });

  let currentTimings = null;

  function updateToggleUI() {
    const toggle = document.getElementById('notifyToggle');
    toggle.className = 'toggle' + (state.notifyOn ? ' on' : '');
  }

  document.getElementById('notifyToggle').addEventListener('click', async () => {
    if (!state.notifyOn) {
      if (!('Notification' in window)) {
        alert('Ye browser notifications support nahi karta.');
        return;
      }
      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        state.notifyOn = true;
        new Notification('Namaz Tracker', { body: 'Reminders on ho gaye hain. App khula rakhein taake time par notification aaye.' });
      } else {
        alert('Notification permission allow karein taake reminders mil sakein.');
      }
    } else {
      state.notifyOn = false;
    }
    saveState();
    updateToggleUI();
  });

  function checkPrayerNotifications() {
    if (!state.notifyOn || !currentTimings) return;
    if (state.notifiedToday.date !== today) {
      state.notifiedToday = { date: today, sent: [] };
    }
    const now = new Date();
    const nowStr = now.toTimeString().slice(0, 5);
    PRAYER_KEYS.forEach(name => {
      const t = currentTimings[name];
      if (!t) return;
      const tClean = t.split(' ')[0];
      if (tClean === nowStr && !state.notifiedToday.sent.includes(name)) {
        if (Notification.permission === 'granted') {
          new Notification('Namaz ka waqt', { body: `${name} ka waqt ho gaya hai.` });
        }
        state.notifiedToday.sent.push(name);
        saveState();
      }
    });
  }

  setInterval(checkPrayerNotifications, 20000);

  document.getElementById('cityInput').value = state.city;
  ensureToday();
  updateToggleUI();
  renderHabits();
  renderStats();
  fetchPrayerTimes();
</script>
</body>
</html>
